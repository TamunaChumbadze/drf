<!-- templates/snippets/snippet_form.html -->
{% extends "base.html" %}

{% block title %}
    {% if form.instance.pk %}Edit Snippet{% else %}Add Snippet{% endif %}
{% endblock %}

{% block content %}
<h2>
    {% if form.instance.pk %}Edit Snippet{% else %}Add Snippet{% endif %}
</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        {% if form.instance.pk %}Update{% else %}Create{% endif %}
    </button>
    <a href="{% url 'snippet-list-web' %}" class="btn">Cancel</a>
</form>
{% endblock %}
