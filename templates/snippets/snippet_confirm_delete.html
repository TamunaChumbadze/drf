<!-- templates/snippets/snippet_confirm_delete.html -->
{% extends "base.html" %}

{% block title %}Delete Snippet{% endblock %}

{% block content %}
<h2>Delete Snippet</h2>

<p>Are you sure you want to delete the snippet: "<strong>{{ object.title }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'snippet-detail-web' object.pk %}" class="btn">Cancel</a>
</form>
{% endblock %}
